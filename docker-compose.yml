# =====================================================
# DiskBench Pro Docker 配置
# =====================================================

services:
  # -------------------- MySQL 数据库 --------------------
  mysql:
    image: mysql:8.0
    container_name: diskbench_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-io_test_platform}
      MYSQL_USER: ${MYSQL_USER:-diskbench}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-diskbench123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- 后端 API --------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diskbench_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-diskbench}:${MYSQL_PASSWORD:-diskbench123}@mysql:3306/${MYSQL_DATABASE:-io_test_platform}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------- 前端 UI --------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diskbench_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

# -------------------- 网络 --------------------
networks:
  default:
    name: diskbench_network

# -------------------- 存储卷 --------------------
volumes:
  mysql_data:
    name: diskbench_mysql_data
