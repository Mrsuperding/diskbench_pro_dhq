[pytest]
# 测试文件模式 - 包含 .spec.py 文件
python_files = test_*.py *_test.py *.spec.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 测试路径
testpaths = test

# 控制台输出样式
console_output_style = progress

# 添加的标记
markers =
    ui: UI 测试标记
    api: API 测试标记
    slow: 慢速测试
    critical: 关键路径测试
    smoke: 冒烟测试
    auth: 需要认证的测试

# 失败重试 (需要 pytest-rerunfailures)
reruns = 2
reruns_delay = 1

# Allure 报告 (需要 allure-pytest)
addopts =
    --alluredir=test/frontend/ui/test-results/allure-results
    --tb=short
    --strict-markers

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
