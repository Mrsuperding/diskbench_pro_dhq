# 登录凭证测试数据
# 按环境区分，默认使用 dev 环境

admin:
  username: "admin"
  password: "admin123"
  role: "admin"
  description: "系统管理员，拥有所有权限"

demo:
  username: "demo"
  password: "demo123"
  role: "user"
  description: "演示用户，限制性权限"

# 无效凭证（用于测试错误场景）
invalid_credentials:
  wrong_password:
    username: "admin"
    password: "wrongpassword"
    expected_error: "用户名或密码错误"

  wrong_username:
    username: "nonexistent"
    password: "admin123"
    expected_error: "用户不存在"

  empty_username:
    username: ""
    password: "admin123"
    expected_error: "请输入用户名"

  empty_password:
    username: "admin"
    password: ""
    expected_error: "请输入密码"

  special_characters:
    username: "admin'; DROP TABLE users;--"
    password: "admin123"
    expected_error: "用户名或密码错误"