[pytest]
# ===========================
# Pytest Configuration
# DiskBench Pro UI Test Suite
# ===========================

# Test discovery
testpaths = tests .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --verbose
    --tb=short
    --strict-markers
    --capture=no
    --color=yes

# Markers
markers =
    ui: UI 测试标记
    api: API 测试标记
    slow: 慢速测试（执行时间 > 30s）
    critical: 关键路径测试
    smoke: 冒烟测试
    auth: 需要认证的测试
    e2e: 端到端测试
    regression: 回归测试

# Timeout (requires pytest-timeout)
timeout = 300
timeout_method = thread

# Retry on failure (requires pytest-rerunfailures)
reruns = 2
reruns_delay = 1

# Reporting
# Allure results directory
allure_results_dir = test-results/allure-results

# HTML report (requires pytest-html)
# html_report = test-results/html-report.html
# self_contained_html = true

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Console errors handling
console_output_style = progress

# Run order
# order by file name by default
# --ff, --nf, --lf options available

# ===========================
# Environment Variables
# ===========================
# TEST_ENV = dev  # Set via command line: pytest --env test

# ===========================
# Coverage Options (requires pytest-cov)
# ===========================
# coverage = true
# coverage_report = html:test-results/coverage
# coverage_omit =
#     */tests/*
#     */fixtures/*
#     */migrations/*
